services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: ticketground:latest
    container_name: ticketground
    restart: unless-stopped
    ports:
      - "${PORT:-4173}:4173"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=4173
      - ADMIN_PORT=50084
      - ADMIN_HOSTNAME=127.0.0.1
      - TIG_SECRET=${TIG_SECRET:?TIG_SECRET is required}
      - TIG_ADMIN_TOKEN=${TIG_ADMIN_TOKEN:?TIG_ADMIN_TOKEN is required}
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ticketground:dev
    container_name: ticketground-dev
    restart: unless-stopped
    ports:
      - "${DEV_PORT:-4173}:4173"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=4173
      - ADMIN_PORT=50084
      - ADMIN_HOSTNAME=127.0.0.1
    env_file:
      - path: .env.local
        required: false
      - path: .env
        required: false
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
