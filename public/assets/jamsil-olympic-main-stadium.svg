<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">잠실 올림픽 주 경기장 좌석 도면</title>
  <desc id="desc">잠실 올림픽 주 경기장 형태를 단순화한 좌석 배치 도면입니다.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9fbff" />
      <stop offset="1" stop-color="#fff8d8" />
    </linearGradient>
    <linearGradient id="field" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2fb66d" />
      <stop offset="1" stop-color="#15874d" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.16" />
    </filter>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)" />
  <ellipse cx="600" cy="360" rx="510" ry="286" fill="#ffffff" stroke="#d6dce8" stroke-width="18" filter="url(#softShadow)" />
  <ellipse cx="600" cy="360" rx="440" ry="230" fill="#f1f4f8" stroke="#c8d1df" stroke-width="14" />
  <ellipse cx="600" cy="360" rx="330" ry="166" fill="#ffffff" stroke="#d9b800" stroke-width="8" stroke-dasharray="18 12" />
  <rect x="430" y="280" width="340" height="170" rx="26" fill="url(#field)" stroke="#0f6f41" stroke-width="6" />
  <line x1="600" y1="280" x2="600" y2="450" stroke="#eafff3" stroke-width="4" opacity="0.75" />
  <circle cx="600" cy="365" r="46" fill="none" stroke="#eafff3" stroke-width="4" opacity="0.75" />
  <path d="M250 210 Q600 80 950 210" fill="none" stroke="#ffd400" stroke-width="42" stroke-linecap="round" opacity="0.86" />
  <path d="M180 310 Q250 180 420 140" fill="none" stroke="#bfeeff" stroke-width="42" stroke-linecap="round" opacity="0.9" />
  <path d="M780 140 Q950 180 1020 310" fill="none" stroke="#bfeeff" stroke-width="42" stroke-linecap="round" opacity="0.9" />
  <path d="M320 560 Q600 660 880 560" fill="none" stroke="#ffe070" stroke-width="44" stroke-linecap="round" opacity="0.9" />
  <g fill="#171717" font-family="Arial, sans-serif" font-weight="800" text-anchor="middle">
    <text x="600" y="120" font-size="30">S 상단 관람석</text>
    <text x="240" y="250" font-size="26">R 1층 좌측</text>
    <text x="960" y="250" font-size="26">R 1층 우측</text>
    <text x="600" y="616" font-size="28">VIP FLOOR</text>
    <text x="600" y="372" fill="#ffffff" font-size="30">MAIN STAGE / FIELD</text>
  </g>
  <g fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.65">
    <ellipse cx="600" cy="360" rx="485" ry="263" />
    <ellipse cx="600" cy="360" rx="405" ry="207" />
    <ellipse cx="600" cy="360" rx="365" ry="186" />
  </g>
</svg>
